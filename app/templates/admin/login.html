<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Grace Lawn Enterprise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script>tailwind.config={theme:{extend:{colors:{'deep-green':'#1a4a2e','mid-green':'#2d7a4f','light-green':'#5bbf85','pale-green':'#e8f5ee'},fontFamily:{display:['Playfair Display','serif'],body:['Lato','sans-serif']}}}}</script>
  <style>body{font-family:'Lato',sans-serif;}</style>
</head>
<body class="min-h-screen bg-deep-green flex items-center justify-center px-4">

  <!-- Background texture -->
  <div class="absolute inset-0 opacity-10" style="background-image:repeating-linear-gradient(45deg,#5bbf85 0,#5bbf85 1px,transparent 0,transparent 50%);background-size:30px 30px;"></div>
  <div class="absolute top-0 right-0 w-96 h-96 rounded-full bg-mid-green opacity-20 blur-3xl"></div>
  <div class="absolute bottom-0 left-0 w-80 h-80 rounded-full bg-light-green opacity-10 blur-3xl"></div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
      <!-- Header -->
      <div class="bg-deep-green px-8 py-8 text-center">
        <div class="w-16 h-16 rounded-full bg-light-green flex items-center justify-center mx-auto mb-4 shadow-lg">
          <i class="fas fa-leaf text-deep-green text-2xl"></i>
        </div>
        <h1 class="font-display text-2xl font-700 text-white">Grace Lawn Enterprise</h1>
        <p class="text-light-green text-xs uppercase tracking-widest mt-1">Admin Panel</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        <h2 class="font-display text-xl font-700 text-deep-green mb-6">Sign In</h2>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
          <div>
            <label class="block text-xs font-700 text-mid-green uppercase tracking-wider mb-1.5">Username</label>
            <div class="relative">
              <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
              <input type="text" name="username" required autofocus placeholder="admin"
                class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-mid-green focus:ring-2 focus:ring-mid-green/20 transition-all"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-700 text-mid-green uppercase tracking-wider mb-1.5">Password</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
              <input type="password" name="password" id="pw-field" required placeholder="••••••••"
                class="w-full pl-10 pr-10 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-mid-green focus:ring-2 focus:ring-mid-green/20 transition-all"/>
              <button type="button" onclick="togglePw()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-mid-green">
                <i class="fas fa-eye text-sm" id="pw-icon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="w-full bg-deep-green hover:bg-mid-green text-white font-700 uppercase tracking-widest text-sm py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-md">
            <i class="fas fa-right-to-bracket"></i> Sign In
          </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
          Default credentials: <code class="bg-gray-100 px-1 rounded">admin</code> / <code class="bg-gray-100 px-1 rounded">admin123</code><br/>
          <span class="text-red-400">Change these after first login.</span>
        </p>
      </div>
    </div>

    <p class="text-center text-white/40 text-xs mt-6">
      <a href="{{ url_for('main.index') }}" class="hover:text-white/70 transition-colors"><i class="fas fa-arrow-left mr-1"></i>Back to website</a>
    </p>
  </div>

  <script>
    function togglePw() {
      const f = document.getElementById('pw-field');
      const i = document.getElementById('pw-icon');
      if (f.type === 'password') { f.type = 'text'; i.classList.replace('fa-eye','fa-eye-slash'); }
      else { f.type = 'password'; i.classList.replace('fa-eye-slash','fa-eye'); }
    }
  </script>
</body>
</html>
